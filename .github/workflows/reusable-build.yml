name: reusable-build
on:
  workflow_call:
    inputs:
      node-version:
        description: 'Node version'
        required: false
        default: '20'
        type: string
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
      - run: echo "reusable build done"
