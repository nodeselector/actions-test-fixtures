name: 'Simple Composite Action'
description: 'Composite with transitive cross-repo dependency'
inputs:
  name:
    description: 'Name to greet'
    default: 'world'
runs:
  using: 'composite'
  steps:
    - uses: nodeselector/actions-test-fixtures/simple-node@main
      with:
        name: ${{ inputs.name }}
    - uses: actions/hello-world-javascript-action@main
      with:
        who-to-greet: testing
    - run: echo "Composite action done"
      shell: bash
